<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subsource Clone - Free Subtitles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header / Navbar -->
    <header class="navbar">
        <div class="logo" onclick="resetSearch()">🌐 Subsource<span>Clone</span></div>
        <div class="nav-links">
            <a href="#" class="active">Browse</a>
            <a href="https://github.com" target="_blank">GitHub</a>
        </div>
    </header>

    <!-- Hero Section (Thanh tìm kiếm trung tâm) -->
    <section class="hero-section">
        <h1>Find your subtitles</h1>
        <p>Explore thousands of community-translated subtitles for Movies and TV Shows</p>
        <div class="search-container">
            <input type="text" id="mainSearch" placeholder="Type movie or TV show name...">
            <button id="searchBtn">Search</button>
        </div>
    </section>

    <!-- Main Content Area -->
    <main class="container">
        <h2 id="sectionTitle">Popular Titles</h2>
        
        <!-- Danh sách phim dạng Grid Card -->
        <div class="movies-grid" id="moviesGrid">
            <!-- JS tự động đổ Card Phim vào đây -->
        </div>
    </main>

    <!-- Subtitle Detail Modal (Bảng hiện phụ đề khi click chọn phim) -->
    <div class="modal" id="subModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <img id="modalPoster" src="" alt="Poster">
                <div>
                    <h2 id="modalMovieTitle">Movie Title</h2>
                    <p id="modalMovieInfo">Year • Type</p>
                </div>
            </div>
            
            <h3>Available Subtitles</h3>
            <table class="sub-table">
                <thead>
                    <tr>
                        <th>Language</th>
                        <th>Release / File Name</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="modalSubList">
                    <!-- JS đổ danh sách file srt vào đây -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
